services:
  gateway:
    build:
      context: .
      dockerfile: deployments/Dockerfile.gateway
    image: acornops/llm-gateway:local
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--reload",
        "--reload-dir",
        "/app"
      ]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      AUTH_JWKS_URL: http://mock-auth:8003/jwks.json
      AUTH_ISSUER: llm-gateway
      AUTH_AUDIENCE: execution-gateway
      ENABLE_API_DOCS: "true"
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-dev_orchestrator_token}
      SECRETS_BACKEND: ${SECRETS_BACKEND:-database}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE:-}
      VAULT_MOUNT: ${VAULT_MOUNT:-secret}
      VAULT_PATH_PREFIX: ${VAULT_PATH_PREFIX:-acornops}
      VAULT_TIMEOUT_MS: ${VAULT_TIMEOUT_MS:-5000}
      VAULT_VERIFY_TLS: ${VAULT_VERIFY_TLS:-false}
    depends_on:
      mock-auth:
        condition: service_started
    ports:
      - "8001:8001"
    volumes:
      - ./:/app

  gateway-init:
    build:
      context: .
      dockerfile: deployments/Dockerfile.gateway
    image: acornops/llm-gateway:local
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      SECRETS_BACKEND: ${SECRETS_BACKEND:-database}
    command: ["sh", "-c", "alembic upgrade head"]
    volumes:
      - ./:/app

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  mock-auth:
    build:
      context: .
      dockerfile: deployments/Dockerfile.mock-auth
    command:
      [
        "uvicorn",
        "mock_auth_server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8003",
        "--reload",
        "--reload-dir",
        "/app"
      ]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
    ports:
      - "8003:8003"
    volumes:
      - ./test:/app

  vault:
    image: hashicorp/vault:1.16
    profiles: ["vault"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: ["vault", "server", "-dev"]
    ports:
      - "8200:8200"
