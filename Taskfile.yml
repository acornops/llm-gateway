version: '3'

silent: true

vars:
  PYTHON:
    sh: |
      if [ -x .venv/bin/python ]; then
        echo .venv/bin/python
      elif command -v python3.12 >/dev/null 2>&1; then
        echo python3.12
      else
        echo python3
      fi

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  python:check:
    desc: Ensure the local interpreter matches production Python
    cmds:
      - "{{.PYTHON}} scripts/check-python-version.py"

  lint:
    desc: Run Ruff lint checks
    cmds:
      - task python:check
      - "{{.PYTHON}} -m ruff check ."

  contracts:check:
    desc: Run contract documentation checks
    cmds:
      - task python:check
      - "{{.PYTHON}} scripts/check-contracts.py"

  harness:check:
    desc: Run harness documentation checks
    cmds:
      - task python:check
      - "{{.PYTHON}} scripts/check-harness.py"

  contract-test:
    desc: Compatibility alias for contracts:check
    cmds:
      - task contracts:check

  harness-test:
    desc: Compatibility alias for harness:check
    cmds:
      - task harness:check

  unit-test:
    desc: Run unit tests
    cmds:
      - task python:check
      - "{{.PYTHON}} -m pytest test --ignore=test/integration"

  validate:
    desc: Run canonical local validation
    cmds:
      - task lint
      - task contracts:check
      - task harness:check
      - task unit-test
